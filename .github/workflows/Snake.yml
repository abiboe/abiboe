# .github/workflows/snake.yml
# Generates the "snake eating your contributions" animation, daily.
# Outputs are pushed to a branch called `output`, referenced from the README
# as: https://raw.githubusercontent.com/USER/USER/output/github-snake-hacker.svg

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */24 * * *"   # once a day
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # One file per line. The `?query` customizes colors.
          # color_dots takes exactly 5 colors (low → high contribution).
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-hacker.svg?color_snake=#00ff88&color_dots=#0a0a0f,#0e3b2e,#12664a,#1a9e6f,#00ff88

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "chore: update snake animation [skip ci]"
