# .github/workflows/profile-3d.yml
# Generates an animated 3D model of your contribution graph, daily.
# Output SVGs land in the ./profile-3d-contrib/ folder of your repo.

name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"   # once a day (18:00 UTC) — adjust if you like
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "chore: regenerate 3d contribution skyline"; then
            git push
          fi
